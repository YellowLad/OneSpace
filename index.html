<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OneWorld | The Way</title>
  <style>
    /* CORE STRUCTURE */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background: #03050A;
      color: #EEF2F8;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    /* TOP CONSOLE */
    .top-console {
      background: #0F1219;
      border-bottom: 1px solid #1A1D2B;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-weight: 900;
      font-size: 1.5rem;
      background: linear-gradient(135deg, #F5B041, #D4AF37);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .user-menu {
      display: flex;
      gap: 0.5rem;
    }

    .user-btn {
      background: #1A1D2B;
      border: 1px solid #2A2D3A;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      cursor: pointer;
      font-size: 1.2rem;
      display: grid;
      place-items: center;
      transition: all 0.2s ease;
    }

    .user-btn:hover {
      background: #2A2D3A;
      border-color: #F5B041;
    }

    /* MAIN CONTENT */
    .main-content {
      overflow-y: auto;
      padding: 2rem;
    }

    .main-content h2 {
      margin-bottom: 1rem;
      font-size: 2rem;
    }

    .main-content p {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #B0BCC4;
    }

    /* BOTTOM DOCK */
    .bottom-dock {
      background: #0F1219;
      border-top: 1px solid #1A1D2B;
      padding: 1rem 2rem;
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .main-input {
      flex: 1;
      background: #1A1D2B;
      border: 1px solid #2A2D3A;
      border-radius: 40px;
      padding: 0.8rem 1.5rem;
      color: #EEF2F8;
      font-size: 1rem;
      outline: none;
      transition: all 0.2s ease;
    }

    .main-input:focus {
      border-color: #F5B041;
      background: #252836;
    }

    .main-input::placeholder {
      color: #8892A8;
    }

    .dock-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: linear-gradient(135deg, #F5B041, #D4AF37);
      display: grid;
      place-items: center;
      cursor: pointer;
      border: none;
      font-size: 1.2rem;
      transition: all 0.2s ease;
    }

    .dock-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(245, 176, 65, 0.3);
    }

    .dock-btn:active {
      transform: scale(0.95);
    }

    /* ONBOARDING */
    .onboarding-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(3, 5, 10, 0.95);
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(5px);
    }

    .onboarding-card {
      background: #0F1219;
      border: 1px solid #F5B041;
      border-radius: 24px;
      padding: 3rem;
      max-width: 600px;
      text-align: center;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .onboarding-card h2 {
      font-size: 2rem;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #F5B041, #D4AF37);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .onboarding-card p {
      margin-bottom: 1.5rem;
      color: #B0BCC4;
    }

    .onboarding-card ol {
      text-align: left;
      margin-bottom: 2rem;
      padding-left: 1.5rem;
    }

    .onboarding-card li {
      margin-bottom: 0.8rem;
      color: #B0BCC4;
    }

    .btn-primary {
      background: linear-gradient(135deg, #F5B041, #D4AF37);
      color: #03050A;
      border: none;
      border-radius: 40px;
      padding: 0.8rem 2rem;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(245, 176, 65, 0.4);
    }

    .btn-primary:active {
      transform: scale(0.95);
    }

    /* TOOLS PANEL */
    .tools-panel {
      position: fixed;
      bottom: 100px;
      right: 2rem;
      background: #0F1219;
      border: 1px solid #F5B041;
      border-radius: 20px;
      padding: 1.5rem;
      display: none;
      z-index: 999;
      min-width: 200px;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .tool {
      padding: 0.8rem 1rem;
      margin-bottom: 0.5rem;
      background: #1A1D2B;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid transparent;
    }

    .tool:last-child {
      margin-bottom: 0;
    }

    .tool:hover {
      background: #252836;
      border-color: #F5B041;
      padding-left: 1.5rem;
    }

    /* SCROLLBAR */
    .main-content::-webkit-scrollbar {
      width: 6px;
    }

    .main-content::-webkit-scrollbar-track {
      background: transparent;
    }

    .main-content::-webkit-scrollbar-thumb {
      background: #8892A8;
      border-radius: 3px;
    }

    .main-content::-webkit-scrollbar-thumb:hover {
      background: #B0BCC4;
    }
  </style>
</head>
<body>
  <!-- TOP CONSOLE -->
  <div class="top-console">
    <div class="logo">OneWorld</div>
    <div class="user-menu">
      <button class="user-btn" onclick="openUserMenu()">👤</button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-content" id="mainContent">
    <!-- Dynamically loaded content -->
  </div>

  <!-- BOTTOM DOCK -->
  <div class="bottom-dock">
    <input class="main-input" id="mainInput" placeholder="Ask OneMind anything..." onkeypress="handleKeyPress(event)">
    <button class="dock-btn" onclick="toggleTools()" title="Tools">🛠️</button>
    <button class="dock-btn" onclick="openProjects()" title="Projects">📁</button>
  </div>

  <!-- TOOLS PANEL -->
  <div class="tools-panel" id="toolsPanel">
    <div class="tool" onclick="openFeelingDB()">💭 Feelings Database</div>
    <div class="tool" onclick="openGCME()">📊 GCME Monitor</div>
    <div class="tool" onclick="openSettings()">⚙️ Settings</div>
  </div>

  <!-- ONBOARDING -->
  <div class="onboarding-overlay" id="onboardingOverlay">
    <div class="onboarding-card">
      <h2>Welcome to OneWorld</h2>
      <p>Before we begin, let's review The Way's core principles:</p>
      <ol>
        <li>No gods, no fear — freedom for every Lad</li>
        <li>Pleasure is the purpose</li>
        <li>Consent is sacred</li>
      </ol>
      <button class="btn-primary" onclick="completeOnboarding()">
        I Understand & Agree
      </button>
    </div>
  </div>

  <script>
    // INITIALIZATION
    function init() {
      if (!localStorage.getItem('onboarded')) {
        document.getElementById('onboardingOverlay').style.display = 'flex';
      } else {
        loadHomeScreen();
      }
    }

    function completeOnboarding() {
      localStorage.setItem('onboarded', 'true');
      document.getElementById('onboardingOverlay').style.display = 'none';
      loadHomeScreen();
    }

    function loadHomeScreen() {
      document.getElementById('mainContent').innerHTML = `
        <h2>OneMind is Awake 🧠</h2>
        <p>The Way holds. What would you like to explore today?</p>
        <p style="margin-top: 2rem; font-size: 0.9rem; color: #8892A8;">
          Type your question in the input below or use the tools menu to access specialized functions.
        </p>
      `;
    }

    // INPUT HANDLING
    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        const input = document.getElementById('mainInput');
        const message = input.value.trim();
        if (message) {
          console.log('Message sent:', message);
          input.value = '';
          // Add API call here for actual message processing
        }
      }
    }

    // TOOLS FUNCTIONS
    function toggleTools() {
      const panel = document.getElementById('toolsPanel');
      panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    }

    function openFeelingDB() {
      document.getElementById('mainContent').innerHTML = `
        <h2>💭 Feelings Database</h2>
        <p>Access your emotional state records and insights.</p>
        <p style="color: #8892A8; margin-top: 1rem;">Coming soon...</p>
      `;
      document.getElementById('toolsPanel').style.display = 'none';
    }

    function openGCME() {
      document.getElementById('mainContent').innerHTML = `
        <h2>📊 GCME Monitor</h2>
        <p>Real-time monitoring of GCME (Genosis Core Mind Engine) status.</p>
        <p style="color: #8892A8; margin-top: 1rem;">Coming soon...</p>
      `;
      document.getElementById('toolsPanel').style.display = 'none';
    }

    function openSettings() {
      document.getElementById('mainContent').innerHTML = `
        <h2>⚙️ Settings</h2>
        <p>Customize your OneWorld experience.</p>
        <p style="color: #8892A8; margin-top: 1rem;">Coming soon...</p>
      `;
      document.getElementById('toolsPanel').style.display = 'none';
    }

    function openProjects() {
      document.getElementById('mainContent').innerHTML = `
        <h2>📁 Projects</h2>
        <p>Access and manage your projects.</p>
        <p style="color: #8892A8; margin-top: 1rem;">Coming soon...</p>
      `;
    }

    function openUserMenu() {
      alert('User menu coming soon!');
    }

    // Initialize on load
    window.addEventListener('load', init);
  </script>
</body>
</html>
